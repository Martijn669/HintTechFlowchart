// ──────────── RENDERING ────────────

function getNodePos(node, phases) {
  const phasesBefore = phases.filter(p => p.afterRow < node.row).length;
  return {
    cx: laneCenter(node.lane),
    cy: HEADER_H + phasesBefore * PHASE_H + node.row * ROW_H + ROW_H / 2 + 10,
  };
}

function buildPath(fn, tn, phases, label) {
  const from = getNodePos(fn, phases), to = getNodePos(tn, phases);
  const fH = fn.type==="decision"?DIAMOND_SIZE/2:NODE_H/2;
  const tH = tn.type==="decision"?DIAMOND_SIZE/2:NODE_H/2;
  const fB=from.cy+fH, tT=to.cy-tH;
  const fR=from.cx+(fn.type==="decision"?DIAMOND_SIZE/2:NODE_W/2);
  const fL=from.cx-(fn.type==="decision"?DIAMOND_SIZE/2:NODE_W/2);
  const same=fn.lane===tn.lane, dec=fn.type==="decision"&&label, left=tn.lane<fn.lane;
  let path,lp;
  if(same){path=`M ${from.cx} ${fB} L ${from.cx} ${tT}`;lp={x:from.cx+10,y:(fB+tT)/2};}
  else if(dec&&left){path=`M ${fL} ${from.cy} L ${to.cx} ${from.cy} L ${to.cx} ${tT}`;lp={x:fL-18,y:from.cy-6};}
  else if(dec){path=`M ${fR} ${from.cy} L ${to.cx} ${from.cy} L ${to.cx} ${tT}`;lp={x:fR+8,y:from.cy-6};}
  else{const mY=fB+(tT-fB)*0.35;path=`M ${from.cx} ${fB} L ${from.cx} ${mY} L ${to.cx} ${mY} L ${to.cx} ${tT}`;lp={x:(from.cx+to.cx)/2,y:mY-6};}
  return {path,labelPos:lp};
}

function DetailPanel({ node, onClose }) {
  if (!node) return null;
  const typeLabel = node.type === "decision" ? "Beslismoment" : node.type === "start" ? "Startpunt" : node.type === "end_green" ? "Eindpunt" : node.type === "end_red" ? "Stoppunt" : "Processtap";
  const actorName = ACTORS[node.lane];
  const accentColor = node.type === "decision" ? C.accent : node.type === "end_red" ? C.red : node.type === "end_green" ? C.green : C.primary;

  return (
    <div onClick={onClose} style={{
      position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",

            {node.detail.split("\n").map((line, i) => {
              const trimmed = line.trim();
              if (!trimmed) return <div key={i} style={{height:"10px"}} />;
              const isSectionHeader = /^\d+\.\s/.test(trimmed) && !trimmed.startsWith("•") && trimmed.length < 80;
              const isSubTitle = trimmed.startsWith("Doel:") || trimmed.startsWith("CHECKLIST") || trimmed.startsWith("VASTLEGGEN") || trimmed.startsWith("Finale");
              if (isSectionHeader) {
                return <div key={i} style={{fontWeight:700,color:"#111827",fontSize:"13px",marginTop:i>0?"14px":"0",marginBottom:"4px",borderLeft:`3px solid ${accentColor}`,paddingLeft:"10px"}}>{trimmed}</div>;

              if (isSubTitle) {
                return <div key={i} style={{fontWeight:700,color:accentColor,fontSize:"13px",marginTop:"10px",marginBottom:"4px"}}>{trimmed}</div>;
              }
              if (trimmed.startsWith("•") || trimmed.startsWith("→")) {
                return <div key={i} style={{paddingLeft:"16px",position:"relative",marginBottom:"3px"}}>
                  <span style={{position:"absolute",left:"4px",color:accentColor,fontWeight:700}}>{trimmed.startsWith("→")?"→":"•"}</span>
                  <span>{trimmed.substring(1).trim()}</span>
                </div>;
              }
              return <div key={i} style={{marginBottom:"2px"}}>{trimmed}</div>;
            })}
          </div>
        </div>

function FlowChart({ flow }) {

            ))}
          </div>
          {[1,2,3].map(i=>(<div key={i} style={{position:"absolute",left:`${i*LANE_W}px`,top:`${HEADER_H}px`,bottom:0,width:"1px",background:C.laneLine,zIndex:1}}/>))}
          {ACTORS.map((_,i)=>(<div key={i} style={{position:"absolute",left:`${i*LANE_W}px`,top:`${HEADER_H}px`,width:`${LANE_W}px`,bottom:0,background:i%2===0?"#FAFBFF":"#FFFFFF",zIndex:0}}/>))}
          {flow.phases.map((p,pi)=>{
            const yPos=HEADER_H+pi*PHASE_H+(p.afterRow+1)*ROW_H;
            return(<div key={pi} style={{position:"absolute",left:0,top:`${yPos}px`,width:"100%",height:`${PHASE_H}px`,background:`${C.primary}0D`,borderTop:`2px solid ${C.primary}30`,borderBottom:`1px solid ${C.primary}15`,display:"flex",alignItems:"center",paddingLeft:"16px",zIndex:5}}>
              <span style={{fontSize:"10px",fontWeight:800,color:C.primary,letterSpacing:"1.2px"}}>{p.label}</span>
            </div>);
          })}
          <svg style={{position:"absolute",left:0,top:0,width:"100%",height:"100%",zIndex:8,pointerEvents:"none"}}>
            <defs>
              <marker id="ah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#9CA3AF"/></marker>
              <marker id="ahR" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill={C.red}/></marker>
            </defs>
            {flow.edges.map((e,i)=>{
              const fn=nodeMap[e.from],tn=nodeMap[e.to];
              if(!fn||!tn)return null;
              const{path,labelPos}=buildPath(fn,tn,flow.phases,e.label);
              const rej=tn.type==="end_red";
              return(<g key={i}>
                <path d={path} fill="none" stroke={rej?C.red:"#9CA3AF"} strokeWidth={rej?2:1.5} strokeDasharray={rej?"6,3":"none"} markerEnd={rej?"url(#ahR)":"url(#ah)"}/>
                {e.label&&labelPos&&(<>
                  <circle cx={labelPos.x} cy={labelPos.y+4} r="11" fill={rej?C.red:C.green}/>
                  <text x={labelPos.x} y={labelPos.y+8} textAnchor="middle" fontSize="8" fontWeight="800" fill="#fff">{e.label}</text>
                </>)}
              </g>);
            })}
          </svg>
          {flow.nodes.map((node)=>{
            const pos=getNodePos(node,flow.phases);
            const isHov=hovered===node.id;
            const hasDetail=!!node.detail;
            if(node.type==="decision"){
              return(
                <div key={node.id} onMouseEnter={()=>setHovered(node.id)} onMouseLeave={()=>setHovered(null)} onClick={()=>hasDetail&&setSelectedNode(node)}
                  style={{position:"absolute",left:`${pos.cx-DIAMOND_SIZE/2}px`,top:`${pos.cy-DIAMOND_SIZE/2}px`,width:`${DIAMOND_SIZE}px`,height:`${DIAMOND_SIZE}px`,transform:"rotate(45deg)",background:C.accent,border:`2px solid ${C.accent}`,borderRadius:"4px",zIndex:10,cursor:hasDetail?"pointer":"default",boxShadow:isHov?`0 4px 16px ${C.accent}50`:"0 1px 4px rgba(0,0,0,0.1)",transition:"box-shadow 0.2s"}}>
                  <div style={{transform:"rotate(-45deg)",width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",textAlign:"center",padding:"4px"}}>
                    <span style={{fontSize:"8.5px",fontWeight:700,color:"#fff",lineHeight:1.2}}>{node.label.replace(/\n/g," ")}</span>
                  </div>
                  {hasDetail&&<div style={{position:"absolute",bottom:"-2px",right:"-2px",transform:"rotate(-45deg)",background:"rgba(255,255,255,0.3)",borderRadius:"50%",width:"14px",height:"14px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"8px",color:"#fff",fontWeight:700}}>i</div>}
                </div>
              );
            }
            let bg=C.nodeFill,bc=C.nodeStroke,tc=C.text,r="6px";
            if(node.type==="start"){bg=C.primaryLight;bc=C.primary;r="20px";}
            if(node.type==="end_green"){bg=C.greenLight;bc=C.green;tc="#14532D";r="20px";}
            if(node.type==="end_red"){bg=C.redLight;bc=C.red;tc="#7F1D1D";r="20px";}
            return(
              <div key={node.id} onMouseEnter={()=>setHovered(node.id)} onMouseLeave={()=>setHovered(null)} onClick={()=>hasDetail&&setSelectedNode(node)}
                style={{position:"absolute",left:`${pos.cx-NODE_W/2}px`,top:`${pos.cy-NODE_H/2}px`,width:`${NODE_W}px`,height:`${NODE_H}px`,background:bg,border:`1.5px solid ${bc}`,borderRadius:r,display:"flex",alignItems:"center",justifyContent:"center",textAlign:"center",zIndex:10,cursor:hasDetail?"pointer":"default",boxShadow:isHov?`0 4px 16px ${bc}30`:"0 1px 3px rgba(0,0,0,0.06)",transition:"box-shadow 0.2s",padding:"4px 10px"}}>
                <span style={{fontSize:"11px",fontWeight:600,color:tc,lineHeight:1.3,whiteSpace:"pre-line"}}>{node.label}</span>
                {hasDetail&&<span style={{position:"absolute",bottom:"3px",right:"7px",fontSize:"13px",color:bc,opacity:0.5,fontWeight:700}}>ⓘ</span>}
              </div>
            );
          })}
          {hovered&&nodeMap[hovered]?.detail&&!selectedNode&&(
            <div style={{position:"absolute",left:tooltipPos.x+14,top:tooltipPos.y-8,background:"#1e293b",color:"#fff",padding:"8px 12px",borderRadius:"8px",fontSize:"11px",lineHeight:1.4,maxWidth:"260px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",zIndex:100,pointerEvents:"none",boxShadow:"0 8px 24px rgba(0,0,0,0.3)"}}>
              <span style={{opacity:0.6,fontSize:"9px"}}>Klik voor details</span>
            </div>
          )}
        </div>
      </div>
      {selectedNode && <DetailPanel node={selectedNode} onClose={()=>setSelectedNode(null)} />}
    </>
  );
}

  const [activeTab, setActiveTab] = useState("zzp");
  return (
    <div style={{fontFamily:"'Segoe UI', -apple-system, system-ui, sans-serif",background:"#F3F4F6",minHeight:"100vh",padding:"28px 24px"}}>
      <div style={{textAlign:"center",marginBottom:"8px"}}>
        <h1 style={{margin:0,fontSize:"28px",fontWeight:900,color:"#111827",letterSpacing:"-0.5px",textTransform:"uppercase"}}>
          {activeTab==="zzp"?"Freelance (ZZP) Procesflow":"Detachering Procesflow"}
        </h1>
        <p style={{margin:"6px 0 0",fontSize:"12px",color:"#6B7280",letterSpacing:"0.3px"}}>

        </p>
      </div>

      <div style={{display:"flex",gap:"6px",justifyContent:"center",marginBottom:"24px"}}>
        {[{id:"zzp",label:"Freelance (ZZP)"},{id:"detachering",label:"Detachering"}].map(tab=>(
          <button key={tab.id} onClick={()=>setActiveTab(tab.id)} style={{

            border:`1.5px solid ${activeTab===tab.id?C.primary:"#D1D5DB"}`,borderRadius:"8px",padding:"10px 28px",fontSize:"13px",fontWeight:700,cursor:"pointer",
          }}>{tab.label}</button>
        ))}
      </div>
      <div style={{display:"flex",justifyContent:"center",gap:"20px",marginBottom:"16px",flexWrap:"wrap"}}>
        {[
          {color:C.primaryLight,border:C.primary,text:"Start",r:"10px"},
          {color:C.nodeFill,border:C.nodeStroke,text:"Processtap",r:"3px"},
          {color:C.accent,border:C.accent,text:"Beslismoment",diamond:true},
          {color:C.greenLight,border:C.green,text:"Afgerond",r:"10px"},
          {color:C.redLight,border:C.red,text:"Stop",r:"10px"},
        ].map((it,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:"6px"}}>
            <div style={{width:it.diamond?"14px":"22px",height:"14px",background:it.color,border:`1.5px solid ${it.border}`,borderRadius:it.diamond?"2px":(it.r||"3px"),transform:it.diamond?"rotate(45deg)":"none"}}/>
            <span style={{fontSize:"11px",color:"#6B7280",fontWeight:600}}>{it.text}</span>
          </div>
        ))}
      </div>
      <p style={{textAlign:"center",fontSize:"11px",color:"#9CA3AF",marginBottom:"16px"}}>
        Klik op een stap voor volledige beschrijving · Scroll horizontaal indien nodig
      </p>
      {activeTab==="zzp"&&<FlowChart flow={zzpFlow}/>}
      {activeTab==="detachering"&&<FlowChart flow={detacheringFlow}/>}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:"20px",padding:"12px 0",borderTop:"1px solid #E5E7EB"}}>
        <div style={{background:C.primary,color:"#fff",fontWeight:900,fontSize:"12px",padding:"4px 10px",borderRadius:"6px"}}>HintTech</div>
        <span style={{fontSize:"10px",color:"#9CA3AF"}}>WDBA · VBAR · SNA · WTTA · NEN4400-1</span>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
